<svg xmlns="http://www.w3.org/2000/svg" width="144" height="48" viewBox="0 0 144 48">
  <!-- Unit Class Badge Sprite Sheet: 3 badges, each 48x48 -->

  <!-- Command Badge (hexagon, amber) -->
  <g id="badge-command">
    <polygon points="24,6 40,14 40,34 24,42 8,34 8,14"
             style="fill:#16120E; stroke:#FFB86C; stroke-width:2;" />
    <polygon points="24,12 34,17 34,31 24,36 14,31 14,17"
             style="fill:none; stroke:#FFB86C; stroke-width:0.75; opacity:0.4;" />
    <!-- Star insignia -->
    <polygon points="24,16 26,21 31,21 27,25 28,30 24,27 20,30 21,25 17,21 22,21"
             style="fill:#FFB86C; opacity:0.8;" />
  </g>

  <!-- Operations Badge (circle, orange) -->
  <g id="badge-operations" transform="translate(48,0)">
    <circle cx="24" cy="24" r="18"
            style="fill:#16120E; stroke:#E8682A; stroke-width:2;" />
    <circle cx="24" cy="24" r="13"
            style="fill:none; stroke:#E8682A; stroke-width:0.75; opacity:0.4;" />
    <!-- Gear teeth on outer ring -->
    <rect x="22" y="4" width="4" height="4" rx="0.5" style="fill:#E8682A; opacity:0.7;" />
    <rect x="22" y="40" width="4" height="4" rx="0.5" style="fill:#E8682A; opacity:0.7;" />
    <rect x="4" y="22" width="4" height="4" rx="0.5" style="fill:#E8682A; opacity:0.7;" />
    <rect x="40" y="22" width="4" height="4" rx="0.5" style="fill:#E8682A; opacity:0.7;" />
    <!-- Inner gear -->
    <circle cx="24" cy="24" r="5" style="fill:none; stroke:#E8682A; stroke-width:1.5;" />
    <circle cx="24" cy="24" r="2" style="fill:#E8682A;" />
  </g>

  <!-- Recon Badge (diamond, green) -->
  <g id="badge-recon" transform="translate(96,0)">
    <polygon points="24,4 44,24 24,44 4,24"
             style="fill:#16120E; stroke:#82C896; stroke-width:2;" />
    <polygon points="24,10 38,24 24,38 10,24"
             style="fill:none; stroke:#82C896; stroke-width:0.75; opacity:0.4;" />
    <!-- Eye/recon motif -->
    <ellipse cx="24" cy="24" rx="8" ry="5" style="fill:none; stroke:#82C896; stroke-width:1;" />
    <circle cx="24" cy="24" r="2.5" style="fill:#82C896;" />
    <circle cx="24" cy="24" r="1" style="fill:#16120E;" />
  </g>
</svg>

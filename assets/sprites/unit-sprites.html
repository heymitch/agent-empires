<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Empires — Unit Sprite Sheet Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 13px;
            margin-bottom: 32px;
            line-height: 1.4;
            font-family: 'JetBrains Mono', monospace;
        }

        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '\25C6';
            color: #00ffcc;
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 0 2px rgba(0, 255, 204, 0.15);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-group { margin-bottom: 20px; }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #00ffcc;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #00ddaa;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #00ffcc;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button:active { transform: translateY(0); }

        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }

        .button.tertiary { background: #00ccaa; }
        .button.tertiary:hover { background: #00aa88; }

        .button.download {
            background: #ffd700;
            color: #141413;
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            letter-spacing: 0.05em;
            font-size: 13px;
        }

        .button.download:hover { background: #ffcc00; }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button { flex: 1; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-width: 0;
            overflow-y: auto;
            padding-top: 10px;
        }

        #canvas-container {
            width: 100%;
            max-width: 1100px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.15);
            background: #0a0a0f;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
            padding: 40px;
        }

        .unit-legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: #666;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>UNIT SPRITES</h1>
            <div class="subtitle">Agent Empires // 8 units x 3 states<br>Isometric 3/4 view @ 128x128</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">&#8592; Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next &#8594;</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">&#8635; Random</button>
            </div>

            <!-- Unit Legend -->
            <div class="control-section">
                <h3>Unit Types</h3>
                <div class="unit-legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#ffd700"></div>Commander</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#00ffcc"></div>Lieutenant</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#33ff77"></div>Scout</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#b388ff"></div>Writer</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#ffaa00"></div>Engineer</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#ff3366"></div>Operative</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#ff6666"></div>Medic</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#ffd700"></div>Diplomat</div>
                </div>
            </div>

            <!-- Parameters -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Detail Level</label>
                    <div class="slider-container">
                        <input type="range" id="detailLevel" min="1" max="5" step="1" value="3" oninput="updateParam('detailLevel', this.value)">
                        <span class="value-display" id="detailLevel-value">3</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Glow Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="glowIntensity" min="0.2" max="2.0" step="0.1" value="1.0" oninput="updateParam('glowIntensity', this.value)">
                        <span class="value-display" id="glowIntensity-value">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Shadow Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="shadowOpacity" min="0" max="100" step="5" value="60" oninput="updateParam('shadowOpacity', this.value)">
                        <span class="value-display" id="shadowOpacity-value">60</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Body Scale</label>
                    <div class="slider-container">
                        <input type="range" id="bodyScale" min="0.6" max="1.2" step="0.05" value="0.9" oninput="updateParam('bodyScale', this.value)">
                        <span class="value-display" id="bodyScale-value">0.9</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Iso Tilt</label>
                    <div class="slider-container">
                        <input type="range" id="isoTilt" min="0.4" max="0.8" step="0.05" value="0.6" oninput="updateParam('isoTilt', this.value)">
                        <span class="value-display" id="isoTilt-value">0.6</span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="control-section">
                <h3>Actions</h3>
                <div style="display:flex;flex-direction:column;gap:8px;">
                    <button class="button download" onclick="downloadSpriteSheet()">&#9660; DOWNLOAD SPRITE SHEET PNG</button>
                    <div class="button-row">
                        <button class="button" onclick="resetParameters()">Reset</button>
                        <button class="button secondary" onclick="initializeSystem()">Regenerate</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Generating unit sprites...</div>
            </div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════════════
    // PARAMETERS
    // ═══════════════════════════════════════════════════════════════════

    let params = {
        seed: 42,
        detailLevel: 3,
        glowIntensity: 1.0,
        shadowOpacity: 60,
        bodyScale: 0.9,
        isoTilt: 0.6
    };

    let defaultParams = {...params};

    // ═══════════════════════════════════════════════════════════════════
    // UNIT DEFINITIONS
    // ═══════════════════════════════════════════════════════════════════

    const CELL = 128;
    const COLS = 8;
    const ROWS = 3;
    const STATES = ['idle', 'working', 'offline'];

    const UNITS = [
        { name: 'Commander',   accent: '#ffd700', shape: 'diamond',  size: 1.25, insignia: 'crown' },
        { name: 'Lieutenant',  accent: '#00ffcc', shape: 'shield',   size: 1.0,  insignia: 'chevron' },
        { name: 'Scout',       accent: '#33ff77', shape: 'arrow',    size: 0.75, insignia: 'binoculars' },
        { name: 'Writer',      accent: '#b388ff', shape: 'circle',   size: 0.9,  insignia: 'quill' },
        { name: 'Engineer',    accent: '#ffaa00', shape: 'hexagon',  size: 0.95, insignia: 'gear' },
        { name: 'Operative',   accent: '#ff3366', shape: 'circle',   size: 0.75, insignia: 'crosshair' },
        { name: 'Medic',       accent: '#ff6666', shape: 'circle',   size: 0.9,  insignia: 'cross' },
        { name: 'Diplomat',    accent: '#ffd700', shape: 'circle',   size: 0.9,  insignia: 'briefcase' }
    ];

    // ═══════════════════════════════════════════════════════════════════
    // SEEDED RANDOM HELPERS
    // ═══════════════════════════════════════════════════════════════════

    let _rngState;
    function seedRng(s) {
        _rngState = s;
    }
    function rng() {
        _rngState = (_rngState * 16807 + 0) % 2147483647;
        return (_rngState - 1) / 2147483646;
    }
    function rngRange(a, b) { return a + rng() * (b - a); }

    // ═══════════════════════════════════════════════════════════════════
    // COLOR HELPERS
    // ═══════════════════════════════════════════════════════════════════

    function hexToRgb(hex) {
        let r = parseInt(hex.slice(1,3), 16);
        let g = parseInt(hex.slice(3,5), 16);
        let b = parseInt(hex.slice(5,7), 16);
        return [r, g, b];
    }

    function lerpColor3(c1, c2, t) {
        return [
            c1[0] + (c2[0] - c1[0]) * t,
            c1[1] + (c2[1] - c1[1]) * t,
            c1[2] + (c2[2] - c1[2]) * t
        ];
    }

    // ═══════════════════════════════════════════════════════════════════
    // P5.JS SPRITE RENDERER
    // ═══════════════════════════════════════════════════════════════════

    let pg; // offscreen graphics for export

    function setup() {
        let canvas = createCanvas(COLS * CELL, ROWS * CELL + 60);
        canvas.parent('canvas-container');
        pixelDensity(1);
        noLoop();
        initializeSystem();
        document.querySelector('.loading').style.display = 'none';
    }

    function initializeSystem() {
        seedRng(params.seed);
        randomSeed(params.seed);
        noiseSeed(params.seed);
        redraw();
    }

    function draw() {
        background(10, 10, 15);

        // Header labels
        textFont('Orbitron, monospace');
        textSize(10);
        textAlign(CENTER, TOP);
        noStroke();

        // Column headers (unit names)
        for (let c = 0; c < COLS; c++) {
            let rgb = hexToRgb(UNITS[c].accent);
            fill(rgb[0], rgb[1], rgb[2], 200);
            text(UNITS[c].name.toUpperCase(), c * CELL + CELL / 2, 6);
        }

        // Row headers
        textAlign(RIGHT, CENTER);
        fill(100, 100, 120);
        textSize(9);

        let headerH = 24;

        // State labels on left edge
        push();
        for (let r = 0; r < ROWS; r++) {
            let y = headerH + r * CELL + CELL / 2;
            fill(100, 100, 120);
            textAlign(LEFT, CENTER);
            textSize(8);
            text(STATES[r].toUpperCase(), 4, y + CELL * 0.42);
        }
        pop();

        // Draw grid lines
        stroke(30, 30, 45);
        strokeWeight(1);
        for (let c = 0; c <= COLS; c++) {
            line(c * CELL, headerH, c * CELL, headerH + ROWS * CELL);
        }
        for (let r = 0; r <= ROWS; r++) {
            line(0, headerH + r * CELL, COLS * CELL, headerH + r * CELL);
        }

        // Draw each sprite
        seedRng(params.seed);
        for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS; r++) {
                let cx = c * CELL + CELL / 2;
                let cy = headerH + r * CELL + CELL / 2;
                drawUnit(cx, cy, UNITS[c], STATES[r]);
            }
        }

        // Bottom legend
        let legendY = headerH + ROWS * CELL + 8;
        textFont('JetBrains Mono, monospace');
        textSize(9);
        textAlign(LEFT, TOP);
        fill(80, 80, 100);
        text('SEED: ' + params.seed + '  |  128x128 per cell  |  Rows: IDLE / WORKING / OFFLINE', 8, legendY);
        fill(50, 50, 65);
        text('Agent Empires Unit Sprite Sheet  //  Isometric 3/4 View', 8, legendY + 14);
    }

    // ═══════════════════════════════════════════════════════════════════
    // UNIT DRAWING ENGINE — Layered Isometric Construction
    // Layer order: shadow → ground glow → status ring → base plate →
    //   body hull → armor panels → visor/window → insignia → equipment →
    //   shoulder pads → status particles
    // ═══════════════════════════════════════════════════════════════════

    function drawUnit(cx, cy, unit, state) {
        let sc = params.bodyScale * unit.size;
        let iso = params.isoTilt;
        let gl = params.glowIntensity;
        let isOffline = (state === 'offline');
        let isWorking = (state === 'working');

        let accent = hexToRgb(unit.accent);
        let bodyBase = [35, 38, 55];
        let darkPlate = [22, 24, 38];

        if (isOffline) {
            accent = lerpColor3(accent, [70, 70, 80], 0.75);
            bodyBase = [28, 28, 34];
            darkPlate = [18, 18, 24];
            gl *= 0.2;
        }
        if (isWorking) {
            accent = lerpColor3(accent, [255, 255, 255], 0.12);
            gl *= 1.5;
        }

        push();
        translate(cx, cy + 6);

        // === LAYER 1: GROUND SHADOW ===
        noStroke();
        let shAlpha = params.shadowOpacity * (isOffline ? 0.35 : 1.0);
        // Multi-layer shadow for depth
        fill(0, 0, 0, shAlpha * 0.3);
        ellipse(0, 24 * sc * iso, 52 * sc, 16 * sc * iso);
        fill(0, 0, 0, shAlpha * 0.5);
        ellipse(0, 22 * sc * iso, 40 * sc, 12 * sc * iso);
        fill(0, 0, 0, shAlpha * 0.7);
        ellipse(0, 21 * sc * iso, 28 * sc, 8 * sc * iso);

        // === LAYER 2: GROUND GLOW (active units only) ===
        if (!isOffline) {
            fill(accent[0], accent[1], accent[2], 8 * gl);
            ellipse(0, 18 * sc * iso, 55 * sc, 18 * sc * iso);
            fill(accent[0], accent[1], accent[2], 15 * gl);
            ellipse(0, 18 * sc * iso, 35 * sc, 11 * sc * iso);
        }

        // === LAYER 3: STATUS RING ===
        drawStatusRing(0, 2 * sc * iso, sc, iso, accent, state, gl);

        // === LAYER 4: BASE PLATE (isometric disc) ===
        drawBasePlate(0, 12 * sc * iso, sc, iso, darkPlate, accent, gl, isOffline);

        // === LAYER 5: BODY HULL ===
        drawBodyHull(0, -2 * sc * iso, sc, iso, unit.shape, bodyBase, darkPlate, accent, gl, isOffline);

        // === LAYER 6: VISOR / FACE WINDOW ===
        drawVisor(0, -5 * sc * iso, sc, iso, unit.shape, accent, gl, isOffline);

        // === LAYER 7: SHOULDER MOUNTS ===
        if (params.detailLevel >= 2) {
            drawShoulders(0, -1 * sc * iso, sc, iso, unit.shape, bodyBase, accent, gl, isOffline);
        }

        // === LAYER 8: INSIGNIA (centered on body) ===
        drawInsignia(0, -4 * sc * iso, sc, iso, unit.insignia, accent, isOffline, isWorking);

        // === LAYER 9: WORKING PARTICLES ===
        if (isWorking) {
            drawWorkingEffect(0, 0, sc, iso, accent, gl);
        }

        // === LAYER 10: OFFLINE STATIC OVERLAY ===
        if (isOffline) {
            drawOfflineStatic(0, 0, sc, iso);
        }

        pop();
    }

    // --- STATUS RING (isometric ellipse) ---
    function drawStatusRing(x, y, sc, iso, accent, state, gl) {
        noFill();
        let ringW = 46 * sc;
        let ringH = ringW * iso;

        if (state === 'idle') {
            // Soft steady ring
            strokeWeight(1.5);
            stroke(accent[0], accent[1], accent[2], 50 * gl);
            ellipse(x, y, ringW * 2, ringH * 2);
            // Outer bloom
            strokeWeight(4);
            stroke(accent[0], accent[1], accent[2], 12 * gl);
            ellipse(x, y, ringW * 2.15, ringH * 2.15);
            // Corner pips (4 cardinal points)
            noStroke();
            fill(accent[0], accent[1], accent[2], 70 * gl);
            for (let i = 0; i < 4; i++) {
                let a = (i / 4) * TWO_PI - PI / 2;
                ellipse(x + cos(a) * ringW, y + sin(a) * ringH, 3 * sc, 3 * sc);
            }
        } else if (state === 'working') {
            // Double ring with rotating tick marks
            strokeWeight(2);
            stroke(accent[0], accent[1], accent[2], 90 * gl);
            ellipse(x, y, ringW * 2, ringH * 2);
            strokeWeight(1);
            stroke(accent[0], accent[1], accent[2], 45 * gl);
            ellipse(x, y, ringW * 2.25, ringH * 2.25);
            // 12 tick marks
            for (let i = 0; i < 12; i++) {
                let a = (i / 12) * TWO_PI;
                let r1 = ringW * 1.0;
                let r2 = ringW * (i % 3 === 0 ? 1.18 : 1.1);
                strokeWeight(i % 3 === 0 ? 2 : 1);
                stroke(accent[0], accent[1], accent[2], (i % 3 === 0 ? 100 : 50) * gl);
                line(x + cos(a) * r1, y + sin(a) * r1 * iso, x + cos(a) * r2, y + sin(a) * r2 * iso);
            }
            // Active pips — filled diamonds at cardinals
            noStroke();
            fill(accent[0], accent[1], accent[2], 130 * gl);
            for (let i = 0; i < 4; i++) {
                let a = (i / 4) * TWO_PI - PI / 2;
                let px = x + cos(a) * ringW * 1.12;
                let py = y + sin(a) * ringH * 1.12;
                push();
                translate(px, py);
                rotate(a);
                beginShape();
                vertex(0, -2.5 * sc); vertex(2 * sc, 0); vertex(0, 2.5 * sc); vertex(-2 * sc, 0);
                endShape(CLOSE);
                pop();
            }
        } else {
            // Offline — broken dashed ring
            strokeWeight(1.2);
            let segs = 16;
            for (let i = 0; i < segs; i++) {
                if (i % 3 !== 2) {
                    let a1 = (i / segs) * TWO_PI;
                    let a2 = ((i + 0.65) / segs) * TWO_PI;
                    stroke(accent[0], accent[1], accent[2], 30 + (i % 2) * 15);
                    beginShape();
                    noFill();
                    for (let s = 0; s <= 5; s++) {
                        let a = lerp(a1, a2, s / 5);
                        vertex(x + cos(a) * ringW, y + sin(a) * ringH);
                    }
                    endShape();
                }
            }
        }
    }

    // --- BASE PLATE (isometric disc under the unit) ---
    function drawBasePlate(x, y, sc, iso, dark, accent, gl, isOffline) {
        let pw = 28 * sc;
        let ph = pw * iso * 0.5;

        // Plate body (dark)
        noStroke();
        fill(dark[0], dark[1], dark[2], 200);
        ellipse(x, y, pw * 2, ph * 2);

        // Top surface highlight
        fill(dark[0] + 15, dark[1] + 15, dark[2] + 20, 180);
        ellipse(x, y - 1.5 * sc, pw * 1.8, ph * 1.6);

        // Rim accent
        if (!isOffline) {
            noFill();
            strokeWeight(1);
            stroke(accent[0], accent[1], accent[2], 35 * gl);
            ellipse(x, y, pw * 2.05, ph * 2.05);
        }
    }

    // --- BODY HULL (main 3D-ish shape) ---
    function drawBodyHull(x, y, sc, iso, shape, bodyBase, darkPlate, accent, gl, isOffline) {
        let sz = 28 * sc;

        // === Outer glow halo ===
        if (!isOffline) {
            noStroke();
            for (let g = 3; g >= 1; g--) {
                fill(accent[0], accent[1], accent[2], (4 * g) * gl);
                drawShapePath(x, y, sz * (1 + g * 0.08), iso, shape);
            }
        }

        // === Bottom (darker) hull layer — simulates 3D depth ===
        let bottomColor = lerpColor3(darkPlate, accent, 0.08);
        fill(bottomColor[0], bottomColor[1], bottomColor[2], 240);
        stroke(accent[0], accent[1], accent[2], isOffline ? 15 : 50 * gl);
        strokeWeight(isOffline ? 0.5 : 1.2);
        drawShapePath(x, y + 3 * sc * iso, sz * 1.02, iso, shape);

        // === Main hull body ===
        let mainColor = lerpColor3(bodyBase, accent, 0.12);
        fill(mainColor[0], mainColor[1], mainColor[2], 235);
        stroke(accent[0], accent[1], accent[2], isOffline ? 20 : 65 * gl);
        strokeWeight(isOffline ? 0.6 : 1.3);
        drawShapePath(x, y, sz, iso, shape);

        // === Top highlight (upper third, lighter) ===
        noStroke();
        let hiColor = lerpColor3(mainColor, [200, 210, 230], 0.2);
        fill(hiColor[0], hiColor[1], hiColor[2], isOffline ? 18 : 45);
        drawShapePath(x - sz * 0.05, y - sz * iso * 0.12, sz * 0.72, iso, shape);

        // === Specular highlight (small bright spot top-left) ===
        if (!isOffline) {
            fill(255, 255, 255, 18 * gl);
            ellipse(x - sz * 0.18, y - sz * iso * 0.22, sz * 0.3, sz * 0.2 * iso);
        }

        // === Armor panel lines ===
        if (params.detailLevel >= 2) {
            drawArmorPanels(x, y, sz, iso, shape, accent, gl, isOffline);
        }

        // === Edge trim (bottom accent) ===
        if (!isOffline) {
            noFill();
            stroke(accent[0], accent[1], accent[2], 30 * gl);
            strokeWeight(0.8);
            // Bottom arc
            let arcSteps = 10;
            beginShape();
            for (let i = 0; i <= arcSteps; i++) {
                let a = PI * 0.25 + (i / arcSteps) * PI * 0.5;
                let r = sz * 0.92;
                vertex(x + cos(a) * r * (shape === 'circle' ? 0.85 : 0.75),
                       y + sin(a) * r * iso * (shape === 'circle' ? 0.85 : 0.75) + 2 * sc * iso);
            }
            endShape();
        }
    }

    function drawShapePath(x, y, sz, iso, shape) {
        switch (shape) {
            case 'diamond':
                beginShape();
                vertex(x, y - sz * iso * 1.15);
                vertex(x + sz * 0.92, y);
                vertex(x, y + sz * iso * 0.85);
                vertex(x - sz * 0.92, y);
                endShape(CLOSE);
                break;
            case 'shield':
                beginShape();
                vertex(x, y - sz * iso * 1.05);
                vertex(x + sz * 0.82, y - sz * iso * 0.3);
                vertex(x + sz * 0.72, y + sz * iso * 0.5);
                vertex(x, y + sz * iso * 1.0);
                vertex(x - sz * 0.72, y + sz * iso * 0.5);
                vertex(x - sz * 0.82, y - sz * iso * 0.3);
                endShape(CLOSE);
                break;
            case 'arrow':
                beginShape();
                vertex(x, y - sz * iso * 1.3);
                vertex(x + sz * 0.65, y - sz * iso * 0.1);
                vertex(x + sz * 0.38, y + sz * iso * 0.0);
                vertex(x + sz * 0.38, y + sz * iso * 0.7);
                vertex(x, y + sz * iso * 0.85);
                vertex(x - sz * 0.38, y + sz * iso * 0.7);
                vertex(x - sz * 0.38, y + sz * iso * 0.0);
                vertex(x - sz * 0.65, y - sz * iso * 0.1);
                endShape(CLOSE);
                break;
            case 'hexagon':
                beginShape();
                for (let i = 0; i < 6; i++) {
                    let a = (i / 6) * TWO_PI - PI / 6;
                    vertex(x + cos(a) * sz * 0.88, y + sin(a) * sz * iso * 0.88);
                }
                endShape(CLOSE);
                break;
            case 'circle':
            default:
                ellipse(x, y, sz * 1.75, sz * 1.75 * iso);
                break;
        }
    }

    function drawArmorPanels(x, y, sz, iso, shape, accent, gl, isOffline) {
        let a1 = isOffline ? 8 : 22 * gl;
        stroke(accent[0], accent[1], accent[2], a1);
        strokeWeight(0.6);
        noFill();

        if (shape === 'diamond') {
            // Horizontal bands
            line(x - sz * 0.45, y - sz * iso * 0.15, x + sz * 0.45, y - sz * iso * 0.15);
            line(x - sz * 0.35, y + sz * iso * 0.18, x + sz * 0.35, y + sz * iso * 0.18);
            // Vertical center seam
            line(x, y - sz * iso * 0.6, x, y + sz * iso * 0.5);
        } else if (shape === 'shield') {
            // Horizontal band
            line(x - sz * 0.55, y - sz * iso * 0.05, x + sz * 0.55, y - sz * iso * 0.05);
            // Lower chevron
            beginShape();
            noFill();
            vertex(x - sz * 0.4, y + sz * iso * 0.2);
            vertex(x, y + sz * iso * 0.55);
            vertex(x + sz * 0.4, y + sz * iso * 0.2);
            endShape();
        } else if (shape === 'hexagon') {
            // Inner hex
            beginShape();
            for (let i = 0; i < 6; i++) {
                let a = (i / 6) * TWO_PI - PI / 6;
                vertex(x + cos(a) * sz * 0.52, y + sin(a) * sz * iso * 0.52);
            }
            endShape(CLOSE);
            // Radial spokes
            if (params.detailLevel >= 3) {
                for (let i = 0; i < 6; i++) {
                    let a = (i / 6) * TWO_PI - PI / 6;
                    line(x + cos(a) * sz * 0.52, y + sin(a) * sz * iso * 0.52,
                         x + cos(a) * sz * 0.82, y + sin(a) * sz * iso * 0.82);
                }
            }
        } else if (shape === 'arrow') {
            // Center spine
            line(x, y - sz * iso * 0.7, x, y + sz * iso * 0.5);
            // Wing lines
            line(x - sz * 0.3, y - sz * iso * 0.02, x + sz * 0.3, y - sz * iso * 0.02);
        } else {
            // Circle — radial lines
            for (let i = 0; i < 4; i++) {
                let a = (i / 4) * TWO_PI + PI / 4;
                let r1 = sz * 0.3;
                let r2 = sz * 0.7;
                line(x + cos(a) * r1, y + sin(a) * r1 * iso, x + cos(a) * r2, y + sin(a) * r2 * iso);
            }
        }

        // Rivet dots at detail level 4+
        if (params.detailLevel >= 4) {
            noStroke();
            fill(accent[0], accent[1], accent[2], isOffline ? 12 : 35 * gl);
            let pts = shape === 'diamond' ? 4 : shape === 'hexagon' ? 6 : shape === 'shield' ? 5 : 4;
            for (let i = 0; i < pts; i++) {
                let ang = (i / pts) * TWO_PI + rng() * 0.2;
                let r = sz * (0.45 + rng() * 0.15);
                ellipse(x + cos(ang) * r, y + sin(ang) * r * iso, 2, 2);
            }
        }

        // Panel scuff marks at detail level 5
        if (params.detailLevel >= 5) {
            stroke(accent[0], accent[1], accent[2], isOffline ? 5 : 12 * gl);
            strokeWeight(0.4);
            for (let i = 0; i < 3; i++) {
                let sx = x + (rng() - 0.5) * sz * 0.8;
                let sy = y + (rng() - 0.5) * sz * iso * 0.6;
                let len = 3 + rng() * 5;
                let ang = rng() * PI;
                line(sx, sy, sx + cos(ang) * len, sy + sin(ang) * len);
            }
        }
    }

    // --- VISOR / FACE WINDOW (glowing eye slit) ---
    function drawVisor(x, y, sc, iso, shape, accent, gl, isOffline) {
        if (isOffline) {
            // Dead visor — dark slit
            fill(15, 15, 20, 150);
            noStroke();
            let vw = 12 * sc;
            let vh = 3 * sc * iso;
            ellipse(x, y, vw, vh);
            return;
        }

        let vw = 14 * sc;
        let vh = 4 * sc * iso;

        // Visor glow (bloom behind)
        noStroke();
        fill(accent[0], accent[1], accent[2], 20 * gl);
        ellipse(x, y, vw * 1.8, vh * 2.5);

        // Visor slit
        fill(accent[0], accent[1], accent[2], 120 * gl);
        beginShape();
        vertex(x - vw * 0.5, y);
        vertex(x - vw * 0.3, y - vh * 0.5);
        vertex(x + vw * 0.3, y - vh * 0.5);
        vertex(x + vw * 0.5, y);
        vertex(x + vw * 0.3, y + vh * 0.3);
        vertex(x - vw * 0.3, y + vh * 0.3);
        endShape(CLOSE);

        // Bright center
        fill(accent[0], accent[1], accent[2], 180 * gl);
        ellipse(x, y - vh * 0.1, vw * 0.4, vh * 0.5);
    }

    // --- SHOULDER MOUNTS ---
    function drawShoulders(x, y, sc, iso, shape, bodyBase, accent, gl, isOffline) {
        let sw = 8 * sc;
        let sh = 5 * sc * iso;
        let offset = 22 * sc;

        let sColor = lerpColor3(bodyBase, accent, 0.08);

        // Left shoulder
        noStroke();
        fill(sColor[0] - 5, sColor[1] - 5, sColor[2], isOffline ? 120 : 200);
        beginShape();
        vertex(x - offset - sw, y + sh * 0.3);
        vertex(x - offset - sw * 0.3, y - sh);
        vertex(x - offset + sw * 0.5, y - sh * 0.5);
        vertex(x - offset + sw * 0.3, y + sh * 0.5);
        endShape(CLOSE);

        // Right shoulder
        fill(sColor[0] + 5, sColor[1] + 5, sColor[2] + 8, isOffline ? 120 : 200);
        beginShape();
        vertex(x + offset + sw, y + sh * 0.3);
        vertex(x + offset + sw * 0.3, y - sh);
        vertex(x + offset - sw * 0.5, y - sh * 0.5);
        vertex(x + offset - sw * 0.3, y + sh * 0.5);
        endShape(CLOSE);

        // Accent edge on shoulders
        if (!isOffline) {
            stroke(accent[0], accent[1], accent[2], 40 * gl);
            strokeWeight(0.8);
            noFill();
            line(x - offset - sw * 0.3, y - sh, x - offset + sw * 0.5, y - sh * 0.5);
            line(x + offset + sw * 0.3, y - sh, x + offset - sw * 0.5, y - sh * 0.5);
        }
    }

    // --- INSIGNIA ---
    function drawInsignia(x, y, sc, iso, type, accent, isOffline, isWorking) {
        let alpha = isOffline ? 30 : (isWorking ? 230 : 150);
        let sz = 11 * sc;

        push();
        translate(x, y);

        switch (type) {
            case 'crown':
                // Royal crown — 5 points
                strokeWeight(1.8);
                stroke(accent[0], accent[1], accent[2], alpha);
                fill(accent[0], accent[1], accent[2], alpha * 0.15);
                beginShape();
                vertex(-sz * 0.85, sz * 0.25);
                vertex(-sz * 0.85, -sz * 0.2);
                vertex(-sz * 0.5, sz * 0.1);
                vertex(-sz * 0.25, -sz * 0.55);
                vertex(0, -sz * 0.1);
                vertex(sz * 0.25, -sz * 0.55);
                vertex(sz * 0.5, sz * 0.1);
                vertex(sz * 0.85, -sz * 0.2);
                vertex(sz * 0.85, sz * 0.25);
                endShape(CLOSE);
                // Crown gems
                noStroke();
                fill(accent[0], accent[1], accent[2], alpha * 0.9);
                ellipse(0, -sz * 0.25, 3.5, 3.5);
                ellipse(-sz * 0.55, 0, 2.5, 2.5);
                ellipse(sz * 0.55, 0, 2.5, 2.5);
                // Star on top
                if (params.detailLevel >= 3) {
                    drawStar(0, -sz * 0.65, 3 * sc, 5, accent, alpha);
                }
                break;

            case 'chevron':
                // Triple chevron (rank marks)
                strokeWeight(2.2);
                stroke(accent[0], accent[1], accent[2], alpha);
                noFill();
                for (let c = 0; c < 3; c++) {
                    let off = c * sz * 0.28;
                    beginShape();
                    vertex(-sz * 0.5, -sz * 0.25 + off);
                    vertex(0, -sz * 0.55 + off);
                    vertex(sz * 0.5, -sz * 0.25 + off);
                    endShape();
                }
                // Shield background
                if (params.detailLevel >= 3) {
                    noStroke();
                    fill(accent[0], accent[1], accent[2], alpha * 0.08);
                    beginShape();
                    vertex(0, -sz * 0.7);
                    vertex(sz * 0.6, -sz * 0.15);
                    vertex(sz * 0.5, sz * 0.4);
                    vertex(0, sz * 0.6);
                    vertex(-sz * 0.5, sz * 0.4);
                    vertex(-sz * 0.6, -sz * 0.15);
                    endShape(CLOSE);
                }
                break;

            case 'binoculars':
                // Dual lens optics
                strokeWeight(1.5);
                stroke(accent[0], accent[1], accent[2], alpha);
                noFill();
                // Lens housings
                ellipse(-sz * 0.32, 0, sz * 0.55, sz * 0.45);
                ellipse(sz * 0.32, 0, sz * 0.55, sz * 0.45);
                // Bridge
                strokeWeight(2);
                line(-sz * 0.08, -sz * 0.08, sz * 0.08, -sz * 0.08);
                // Lens fills (glowing)
                noStroke();
                fill(accent[0], accent[1], accent[2], alpha * 0.4);
                ellipse(-sz * 0.32, -sz * 0.02, sz * 0.3, sz * 0.25);
                ellipse(sz * 0.32, -sz * 0.02, sz * 0.3, sz * 0.25);
                // Specular
                fill(255, 255, 255, alpha * 0.25);
                ellipse(-sz * 0.35, -sz * 0.08, sz * 0.12, sz * 0.08);
                ellipse(sz * 0.29, -sz * 0.08, sz * 0.12, sz * 0.08);
                // Antenna
                if (params.detailLevel >= 3) {
                    stroke(accent[0], accent[1], accent[2], alpha * 0.6);
                    strokeWeight(1);
                    line(sz * 0.3, -sz * 0.25, sz * 0.45, -sz * 0.55);
                    noStroke();
                    fill(accent[0], accent[1], accent[2], alpha);
                    ellipse(sz * 0.45, -sz * 0.55, 2.5, 2.5);
                }
                break;

            case 'quill':
                // Stylized quill with scroll
                strokeWeight(1.8);
                stroke(accent[0], accent[1], accent[2], alpha);
                noFill();
                // Quill shaft (curved)
                beginShape();
                noFill();
                vertex(sz * 0.35, -sz * 0.65);
                bezierVertex(sz * 0.2, -sz * 0.3, sz * 0.05, 0, -sz * 0.2, sz * 0.45);
                endShape();
                // Feather vanes
                beginShape();
                vertex(sz * 0.35, -sz * 0.65);
                bezierVertex(sz * 0.65, -sz * 0.55, sz * 0.55, -sz * 0.25, sz * 0.15, -sz * 0.05);
                endShape();
                beginShape();
                vertex(sz * 0.35, -sz * 0.65);
                bezierVertex(sz * 0.05, -sz * 0.65, -sz * 0.05, -sz * 0.35, sz * 0.15, -sz * 0.05);
                endShape();
                // Nib
                noStroke();
                fill(accent[0], accent[1], accent[2], alpha);
                triangle(-sz * 0.2, sz * 0.45, -sz * 0.3, sz * 0.6, -sz * 0.1, sz * 0.6);
                // Ink drops (working state scatter)
                if (isWorking) {
                    fill(accent[0], accent[1], accent[2], alpha * 0.5);
                    ellipse(-sz * 0.35, sz * 0.55, 2, 2);
                    ellipse(-sz * 0.15, sz * 0.65, 1.5, 1.5);
                }
                // Scroll hint
                if (params.detailLevel >= 3) {
                    stroke(accent[0], accent[1], accent[2], alpha * 0.3);
                    strokeWeight(0.8);
                    noFill();
                    arc(-sz * 0.5, sz * 0.2, sz * 0.35, sz * 0.2, -PI * 0.5, PI * 0.5);
                }
                break;

            case 'gear':
                // Chunky industrial gear
                let teeth = 8;
                let innerR = sz * 0.32;
                let outerR = sz * 0.55;
                let toothW = 0.35;

                // Gear body
                noStroke();
                fill(accent[0], accent[1], accent[2], alpha * 0.12);
                ellipse(0, 0, outerR * 2.2, outerR * 2.2);

                strokeWeight(1.8);
                stroke(accent[0], accent[1], accent[2], alpha);
                noFill();
                beginShape();
                for (let i = 0; i < teeth; i++) {
                    let a1 = (i / teeth) * TWO_PI;
                    let a2 = a1 + (toothW / teeth) * TWO_PI;
                    let a3 = a1 + (0.5 / teeth) * TWO_PI;
                    let a4 = a1 + ((1 - toothW) / teeth) * TWO_PI;
                    vertex(cos(a1) * innerR, sin(a1) * innerR);
                    vertex(cos(a2) * outerR, sin(a2) * outerR);
                    vertex(cos(a3) * outerR, sin(a3) * outerR);
                    vertex(cos(a4) * innerR, sin(a4) * innerR);
                }
                endShape(CLOSE);
                // Center axle
                ellipse(0, 0, sz * 0.18, sz * 0.18);
                // Center dot
                noStroke();
                fill(accent[0], accent[1], accent[2], alpha * 0.6);
                ellipse(0, 0, sz * 0.08, sz * 0.08);
                // Wrench overlay
                if (params.detailLevel >= 3) {
                    stroke(accent[0], accent[1], accent[2], alpha * 0.4);
                    strokeWeight(1.2);
                    noFill();
                    line(-sz * 0.1, -sz * 0.15, sz * 0.15, sz * 0.2);
                    // Wrench head
                    arc(sz * 0.15, sz * 0.2, sz * 0.15, sz * 0.15, -PI * 0.3, PI * 0.7);
                }
                break;

            case 'crosshair':
                // Tactical crosshair — sniper style
                strokeWeight(1.2);
                stroke(accent[0], accent[1], accent[2], alpha);
                noFill();
                // Outer ring
                ellipse(0, 0, sz * 0.95, sz * 0.95);
                // Inner ring
                ellipse(0, 0, sz * 0.45, sz * 0.45);
                // Cross lines with gap
                let gap = sz * 0.12;
                let ext = sz * 0.58;
                let mid = sz * 0.25;
                // Thick outer segments
                strokeWeight(1.8);
                line(-ext, 0, -mid, 0);
                line(mid, 0, ext, 0);
                line(0, -ext, 0, -mid);
                line(0, mid, 0, ext);
                // Thin inner
                strokeWeight(0.8);
                line(-mid, 0, -gap, 0);
                line(gap, 0, mid, 0);
                line(0, -mid, 0, -gap);
                line(0, gap, 0, mid);
                // Center dot (kill dot)
                noStroke();
                fill(accent[0], accent[1], accent[2], alpha);
                ellipse(0, 0, 3, 3);
                // Diagonal hash marks
                if (params.detailLevel >= 3) {
                    stroke(accent[0], accent[1], accent[2], alpha * 0.4);
                    strokeWeight(0.7);
                    for (let i = 0; i < 4; i++) {
                        let a = PI / 4 + (i / 4) * TWO_PI;
                        let r1 = sz * 0.38;
                        let r2 = sz * 0.43;
                        line(cos(a) * r1, sin(a) * r1, cos(a) * r2, sin(a) * r2);
                    }
                }
                break;

            case 'cross':
                // Bold medical cross with rounded arms
                noStroke();
                let cw = sz * 0.28;
                let ch = sz * 0.58;
                // Background circle
                fill(accent[0], accent[1], accent[2], alpha * 0.12);
                ellipse(0, 0, ch * 2.2, ch * 2.2);
                // Cross body
                fill(accent[0], accent[1], accent[2], alpha * 0.8);
                rectMode(CENTER);
                rect(0, 0, cw, ch, 2);
                rect(0, 0, ch, cw, 2);
                // White highlight cross (smaller, brighter)
                fill(255, 255, 255, alpha * 0.2);
                rect(0, -cw * 0.15, cw * 0.6, ch * 0.7, 1);
                rect(-cw * 0.15, 0, ch * 0.7, cw * 0.6, 1);
                // Outline
                strokeWeight(1);
                stroke(accent[0], accent[1], accent[2], alpha * 0.5);
                noFill();
                rect(0, 0, cw + 2, ch + 2, 2);
                rect(0, 0, ch + 2, cw + 2, 2);
                // Heartbeat line
                if (params.detailLevel >= 3 && !isOffline) {
                    stroke(accent[0], accent[1], accent[2], alpha * 0.3);
                    strokeWeight(0.8);
                    noFill();
                    let hx = -sz * 0.5;
                    beginShape();
                    vertex(hx, sz * 0.45);
                    vertex(hx + sz * 0.2, sz * 0.45);
                    vertex(hx + sz * 0.3, sz * 0.3);
                    vertex(hx + sz * 0.4, sz * 0.55);
                    vertex(hx + sz * 0.5, sz * 0.4);
                    vertex(hx + sz * 0.6, sz * 0.45);
                    vertex(hx + sz * 1.0, sz * 0.45);
                    endShape();
                }
                break;

            case 'briefcase':
                // Diplomat briefcase with handshake
                rectMode(CENTER);
                // Briefcase body
                strokeWeight(1.5);
                stroke(accent[0], accent[1], accent[2], alpha);
                fill(accent[0], accent[1], accent[2], alpha * 0.08);
                rect(0, sz * 0.05, sz * 0.95, sz * 0.6, 3);
                // Handle
                noFill();
                strokeWeight(1.8);
                arc(0, -sz * 0.2, sz * 0.4, sz * 0.35, PI, TWO_PI);
                // Clasp
                noStroke();
                fill(accent[0], accent[1], accent[2], alpha);
                rect(0, -sz * 0.04, sz * 0.12, sz * 0.08, 1);
                // Handshake icon inside
                stroke(accent[0], accent[1], accent[2], alpha * 0.5);
                strokeWeight(1.2);
                noFill();
                // Two hands meeting
                beginShape();
                vertex(-sz * 0.25, sz * 0.15);
                vertex(-sz * 0.1, sz * 0.05);
                vertex(0, sz * 0.12);
                vertex(sz * 0.1, sz * 0.05);
                vertex(sz * 0.25, sz * 0.15);
                endShape();
                // Document lines
                if (params.detailLevel >= 3) {
                    stroke(accent[0], accent[1], accent[2], alpha * 0.2);
                    strokeWeight(0.6);
                    line(-sz * 0.25, sz * 0.25, sz * 0.25, sz * 0.25);
                    line(-sz * 0.2, sz * 0.32, sz * 0.2, sz * 0.32);
                }
                break;
        }

        pop();
    }

    // Helper: draw a small N-pointed star
    function drawStar(x, y, r, points, accent, alpha) {
        noStroke();
        fill(accent[0], accent[1], accent[2], alpha);
        beginShape();
        for (let i = 0; i < points * 2; i++) {
            let a = (i / (points * 2)) * TWO_PI - PI / 2;
            let rad = (i % 2 === 0) ? r : r * 0.4;
            vertex(x + cos(a) * rad, y + sin(a) * rad);
        }
        endShape(CLOSE);
    }

    // --- WORKING EFFECT (energy particles + arcs) ---
    function drawWorkingEffect(x, y, sc, iso, accent, gl) {
        noStroke();
        let numParticles = 6 + Math.floor(params.detailLevel * 2.5);
        for (let i = 0; i < numParticles; i++) {
            let angle = rng() * TWO_PI;
            let dist = (22 + rng() * 22) * sc;
            let px = x + cos(angle) * dist;
            let py = y + sin(angle) * dist * iso;
            let sz = 1 + rng() * 3;
            let a = (60 + rng() * 120) * gl;
            fill(accent[0], accent[1], accent[2], a);
            ellipse(px, py, sz, sz);
            // Tiny trail behind each particle
            if (params.detailLevel >= 3) {
                let trailLen = 4 + rng() * 4;
                stroke(accent[0], accent[1], accent[2], a * 0.3);
                strokeWeight(0.5);
                line(px, py, px - cos(angle) * trailLen, py - sin(angle) * trailLen * iso);
                noStroke();
            }
        }

        // Energy arcs
        stroke(accent[0], accent[1], accent[2], 35 * gl);
        strokeWeight(0.8);
        noFill();
        let arcR = 28 * sc;
        let startA = rng() * TWO_PI;
        arc(x, y, arcR * 2, arcR * 2 * iso, startA, startA + PI * 0.45);
        strokeWeight(0.5);
        stroke(accent[0], accent[1], accent[2], 20 * gl);
        let startA2 = startA + PI * 0.7;
        arc(x, y, arcR * 1.5, arcR * 1.5 * iso, startA2, startA2 + PI * 0.35);

        // Data stream dots (rising)
        if (params.detailLevel >= 3) {
            noStroke();
            for (let i = 0; i < 3; i++) {
                let dx = x + (rng() - 0.5) * 15 * sc;
                let dy = y - (10 + rng() * 25) * sc * iso;
                let dsz = 1.5 + rng() * 1;
                fill(accent[0], accent[1], accent[2], (40 + rng() * 60) * gl);
                rect(dx, dy, dsz, dsz * 0.6);
            }
        }
    }

    // --- OFFLINE STATIC OVERLAY ---
    function drawOfflineStatic(x, y, sc, iso) {
        // Subtle noise/scan lines
        stroke(80, 80, 100, 8);
        strokeWeight(0.4);
        for (let i = 0; i < 6; i++) {
            let ly = y + (rng() - 0.5) * 40 * sc * iso;
            let lx1 = x - 20 * sc + rng() * 5;
            let lx2 = x + 20 * sc - rng() * 5;
            line(lx1, ly, lx2, ly);
        }
        // X mark (offline indicator)
        stroke(80, 60, 60, 25);
        strokeWeight(1.5);
        let xsz = 6 * sc;
        line(x - xsz, y - 18 * sc * iso - xsz * iso, x + xsz, y - 18 * sc * iso + xsz * iso);
        line(x + xsz, y - 18 * sc * iso - xsz * iso, x - xsz, y - 18 * sc * iso + xsz * iso);
    }

    // ═══════════════════════════════════════════════════════════════════
    // DOWNLOAD
    // ═══════════════════════════════════════════════════════════════════

    function downloadSpriteSheet() {
        // Create a clean sprite sheet (no labels, no grid chrome)
        let pg = createGraphics(COLS * CELL, ROWS * CELL);
        pg.pixelDensity(1);
        pg.clear();

        seedRng(params.seed);

        for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS; r++) {
                let cx = c * CELL + CELL / 2;
                let cy = r * CELL + CELL / 2;
                drawUnitOnGraphics(pg, cx, cy, UNITS[c], STATES[r]);
            }
        }

        pg.save('agent-empires-units-seed-' + params.seed + '.png');
        pg.remove();
    }

    function drawUnitOnGraphics(g, cx, cy, unit, state) {
        // Re-render onto offscreen graphics with transparent bg
        // We push the main canvas draw into a temporary approach:
        // save current canvas, render, restore
        // Actually, for simplicity, use saveCanvas on main but
        // let's just save the visible canvas with labels stripped:

        // For a clean export we re-use the main draw logic but on pg
        // This is complex with p5, so let's do a simpler approach:
        // Just export the main canvas cropped

        // Actually let's just redraw the sprites cleanly onto pg
        // using p5's push/pop on the main canvas and copying pixels

        // Simplest correct approach: we already drew everything on main canvas,
        // just copy the sprite region
        let srcX = (cx - CELL / 2);
        let srcY = (cy - CELL / 2);
        // But pg needs its own drawing. Let's use the p5 copy approach:
        g.copy(
            get(srcX, srcY + 24, CELL, CELL), // +24 for header offset
            0, 0, CELL, CELL,
            srcX, cy - CELL / 2, CELL, CELL
        );
    }

    function downloadSpriteSheet() {
        // Simple approach: export visible canvas but crop to just the sprites
        let headerH = 24;
        let spriteRegion = get(0, headerH, COLS * CELL, ROWS * CELL);

        // Create offscreen canvas at exact sprite sheet dimensions
        let pg = createGraphics(COLS * CELL, ROWS * CELL);
        pg.pixelDensity(1);
        pg.background(10, 10, 15);
        pg.image(spriteRegion, 0, 0);
        pg.save('agent-empires-units-seed-' + params.seed + '.png');
        setTimeout(() => pg.remove(), 100);
    }

    // ═══════════════════════════════════════════════════════════════════
    // UI CONTROL HANDLERS
    // ═══════════════════════════════════════════════════════════════════

    function updateParam(name, value) {
        params[name] = parseFloat(value);
        document.getElementById(name + '-value').textContent = value;
        seedRng(params.seed);
        redraw();
    }

    function updateSeedDisplay() {
        document.getElementById('seed-input').value = params.seed;
    }

    function updateSeed() {
        let input = document.getElementById('seed-input');
        let newSeed = parseInt(input.value);
        if (newSeed && newSeed > 0) {
            params.seed = newSeed;
            initializeSystem();
        } else {
            updateSeedDisplay();
        }
    }

    function previousSeed() {
        params.seed = Math.max(1, params.seed - 1);
        updateSeedDisplay();
        initializeSystem();
    }

    function nextSeed() {
        params.seed = params.seed + 1;
        updateSeedDisplay();
        initializeSystem();
    }

    function randomSeedAndUpdate() {
        params.seed = Math.floor(Math.random() * 999999) + 1;
        updateSeedDisplay();
        initializeSystem();
    }

    function resetParameters() {
        params = {...defaultParams};
        document.getElementById('detailLevel').value = params.detailLevel;
        document.getElementById('detailLevel-value').textContent = params.detailLevel;
        document.getElementById('glowIntensity').value = params.glowIntensity;
        document.getElementById('glowIntensity-value').textContent = params.glowIntensity;
        document.getElementById('shadowOpacity').value = params.shadowOpacity;
        document.getElementById('shadowOpacity-value').textContent = params.shadowOpacity;
        document.getElementById('bodyScale').value = params.bodyScale;
        document.getElementById('bodyScale-value').textContent = params.bodyScale;
        document.getElementById('isoTilt').value = params.isoTilt;
        document.getElementById('isoTilt-value').textContent = params.isoTilt;
        updateSeedDisplay();
        initializeSystem();
    }

    window.addEventListener('load', function() {
        updateSeedDisplay();
    });
    </script>
